# Cloudflare Worker — envoi de la newsletter hebdomadaire (vendredi 14h Europe/Luxembourg)
# À déployer séparément du site Pages : `cd newsletter-worker && npx wrangler deploy`

name = "dc-watch-newsletter"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Cron en UTC. 14h Luxembourg = 12:00 UTC (été/CEST) OU 13:00 UTC (hiver/CET).
# On déclenche aux deux heures ; le code ne LANCE l'envoi que s'il est réellement 14h à Luxembourg.
# → garantit 14h locale toute l'année, sans double envoi.
[triggers]
crons = ["0 12 * * 5", "0 13 * * 5"]

# Même namespace KV que le formulaire d'inscription du site (récupère son ID dans le dashboard Cloudflare).
[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "REMPLACER_PAR_ID_DU_NAMESPACE_KV"

[vars]
SITE_URL = "https://REMPLACER-par-ton-domaine-ou-projet.pages.dev"
# Adresse d'expédition : le domaine doit être vérifié dans Resend.
FROM_EMAIL = "Data Center Watch <newsletter@REMPLACER-par-ton-domaine>"

# Secrets à définir en ligne de commande (ne PAS les écrire ici) :
#   npx wrangler secret put RESEND_API_KEY
#   npx wrangler secret put UNSUB_SECRET   (une longue chaîne aléatoire, identique côté Pages)
